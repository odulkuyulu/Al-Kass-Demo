name: Trigger auto deployment for alkass-translation

on:
  push:
    branches: 
      [ main ]

  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ALKASSTRANSLATION_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ALKASSTRANSLATION_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ALKASSTRANSLATION_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: alkassacr.azurecr.io
          registryUsername: ${{ secrets.ALKASSTRANSLATION_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ALKASSTRANSLATION_REGISTRY_PASSWORD }}
          containerAppName: alkass-translation
          resourceGroup: rg-alkass-demo
          imageToBuild: alkassacr.azurecr.io/alkass-translation:${{ github.sha }}


